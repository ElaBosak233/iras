services:
  backend:
    build: .
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    ports:
      - "8000:8000"

  frontend:
    build: ./web
    ports:
      - "80:80"
    depends_on:
      - backend

  redis:
    image: redis:latest
    volumes:
      - redis_data:/data

volumes:
  redis_data:
